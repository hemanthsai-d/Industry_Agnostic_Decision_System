# CI-optimised overrides for decision-platform Helm chart.
# Disables PostgreSQL/Redis subcharts to avoid Docker Hub pulls in kind.
# All post-deploy validation runs with --skip-db so full database
# connectivity is not required on the CI runner.

replicaCount: 1

image:
  repository: decision-api
  tag: local
  pullPolicy: Never

modelServer:
  enabled: false  # model-server not tested in CI kind deploy

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false

service:
  type: NodePort
  port: 8000
  nodePort: 30080

canary:
  enabled: false
  weight: 0

opa:
  enabled: false

# Disable secrets ref — env vars are inline
secretRef: ""

env:
  APP_ENV: staging
  AUTH_ENABLED: "false"
  USE_POSTGRES: "false"
  USE_REDIS: "false"
  RATE_LIMIT_ENABLED: "false"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "false"
  PII_REDACTION_ENABLED: "true"
  MODEL_SHADOW_ENABLED: "false"
  GENERATION_BACKEND: template
  ROUTING_MODEL_BACKEND: heuristic

ingress:
  enabled: false

podDisruptionBudget:
  minAvailable: 0

topologySpreadConstraints: []

podSecurityContext: {}

containerSecurityContext:
  readOnlyRootFilesystem: false

networkPolicy:
  enabled: false

# Disable subcharts — CI runner cannot pull from Docker Hub reliably
# and --skip-db is used for all validation anyway.
postgresql:
  enabled: false

redis:
  enabled: false

environment: ci
